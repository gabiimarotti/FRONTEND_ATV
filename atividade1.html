<!DOCTYPE html>
<html>
<head>
    <title>Minha Coleção de Funko Pops</title>

 <style>
        body {
            background-color: #ffe6f2;
            font-family: Verdana, sans-serif;
            text-align: center;
        }

        h1 {
            color: #d63384;
        }

        h2 {
            color: #e83e8c;
        }

        h3 {
            color: #ff69b4;
        }

        p {
            color: #8b3a62;
            font-size: 18px;
        }

        img {
            border-radius: 10px;
            border: 3px solid #ff99cc;
            margin: 10px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            background-color: #fff0f5; /* rosa bem suave */
        }

        th {
            background-color: #ff69b4;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #ffd6eb; /* rosa alternado */
        }
    </style>


</head>

<body>

    <h1>Minha Coleção de Funko Pops</h1>

    <h2>Meu Acervo</h2>

    <h3>Marvel</h3>
    <img src="imagem-homem-aranha.jpg" alt="Funko Homem-Aranha" width="200">
    <img src="imagem-homem-ferro.jpg" alt="Funko Homem de Ferro" width="200">
    <img src="imagem-capitao-america.jpg" alt="Funko Capitão América" width="200">

    <h3>Princesas</h3>
    <img src="imagem-bela.jpg" alt="Funko Harry Potter" width="200">
    <img src="imagem-ariel.jpg" alt="Funko Hermione" width="200">
    <img src="imagem-cinderela.jpg" alt="Funko Voldemort" width="200">

    <h3>Star Wars</h3>
    <img src="imagem-darth-vader.jpg" alt="Funko Darth Vader" width="200">
    <img src="imagem-luke.jpg" alt="Funko Luke Skywalker" width="200">
    <img src="imagem-yoda.jpg" alt="Funko Grogu" width="200">

    <h3>Séries</h3>
    <img src="imagem-wandinha.jpg" alt="Funko Wandinha" width="200">
    <img src="imagem-stranger-things.jpg" alt="Funko Stranger Things" width="200">
    <img src="imagem-the-office.jpg" alt="Funko The Office" width="200">

    <h2>Resumo da Coleção</h2>

    <table border="1">
        <tr>
            <th>Categoria</th>
            <th>Quantidade</th>
        </tr>
        <tr>
            <td>Marvel</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Princesas</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Star Wars</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Séries</td>
            <td>3</td>
        </tr>
    </table>

</body>
</html>
